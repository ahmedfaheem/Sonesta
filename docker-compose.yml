services:
  # The Laravel Application (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sonesta-app
    container_name: sonesta-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    working_dir: /var/www
    command: sh -c "mkdir -p /var/www/database && touch /var/www/database/database.sqlite && mkdir -p /var/www/storage/framework/cache /var/www/storage/framework/data /var/www/storage/framework/sessions /var/www/storage/framework/views /var/www/bootstrap/cache && [ -f /var/www/.env ] || cp /var/www/.env.example /var/www/.env && php artisan key:generate --force && php artisan migrate --force && php artisan config:clear && php artisan cache:clear && php artisan view:clear && npm ci && npm run build && chown -R www-data:www-data /var/www/database /var/www/storage /var/www/bootstrap/cache && chmod -R 777 /var/www/database /var/www/storage /var/www/bootstrap/cache && php-fpm"
    volumes:
      - ./:/var/www
      - ./storage:/var/www/storage
      - ./bootstrap/cache:/var/www/bootstrap/cache
    networks:
      - sonesta-network

  # Laravel Queue Worker (process queued notifications/jobs)
  queue:
    image: sonesta-app
    container_name: sonesta-queue
    restart: unless-stopped
    working_dir: /var/www
    command: sh -c "php artisan queue:work --sleep=3 --tries=3 --timeout=90"
    volumes:
      - ./:/var/www
      - /var/www/vendor
    networks:
      - sonesta-network
    depends_on:
      - app

  # Laravel Scheduler (runs scheduled commands)
  scheduler:
    image: sonesta-app
    container_name: sonesta-scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: sh -c "php artisan schedule:work"
    volumes:
      - ./:/var/www
      - /var/www/vendor
    networks:
      - sonesta-network
    depends_on:
      - app
  # Nginx Web Server
  web:
    image: nginx:alpine
    container_name: sonesta-web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/app.conf:/etc/nginx/conf.d/default.conf
    networks:
      - sonesta-network
    depends_on:
      - app

networks:
  sonesta-network:
    driver: bridge

version: '3.8'

services:
  # The Laravel Application (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sonesta-app
    container_name: sonesta-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    working_dir: /var/www
    command: sh -c "mkdir -p /var/www/database && touch /var/www/database/database.sqlite && npm run build && chown -R www-data:www-data /var/www/database /var/www/storage /var/www/bootstrap/cache && chmod -R 775 /var/www/database /var/www/storage /var/www/bootstrap/cache && php-fpm"
    volumes:
      - ./:/var/www
      - ./storage:/var/www/storage
      - ./bootstrap/cache:/var/www/bootstrap/cache
    networks:
      - sonesta-network

  # Nginx Web Server
  web:
    image: nginx:alpine
    container_name: sonesta-web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/app.conf:/etc/nginx/conf.d/default.conf
    networks:
      - sonesta-network
    depends_on:
      - app

networks:
  sonesta-network:
    driver: bridge
